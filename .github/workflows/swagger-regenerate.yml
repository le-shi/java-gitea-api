name: Swagger Regenerate Release

on:
  workflow_dispatch:
  push:
    branches:
      - 'release/*'
    paths:
      - 'swagger.v1.json'
      - 'pom.xml'
      - 'README.md'
      - '.github/workflows/swagger-regenerate.yml'

permissions:
  actions: write
  contents: write

jobs:
  regenerate-build-tag:
    name: Regenerate, validate, clean, commit and tag
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'
          cache: maven

      - name: Ensure current ref is a release branch
        run: |
          case "$GITHUB_REF" in
            refs/heads/release/*) ;;
            *) echo "This workflow only supports release/* branches"; exit 1 ;;
          esac

      - name: Read version from swagger.v1.json
        run: |
          VERSION=$(python - <<'PY'
          import json
          from pathlib import Path
          data = json.loads(Path('swagger.v1.json').read_text(encoding='utf-8'))
          print(data['info']['version'])
          PY
          )
          if [ -z "$VERSION" ]; then
            echo "Unable to read version from swagger.v1.json"
            exit 1
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Sync pom.xml and README.md versions
        run: |
          python - <<'PY'
          import pathlib
          import re
          import json

          version = json.loads(pathlib.Path('swagger.v1.json').read_text(encoding='utf-8'))['info']['version']

          pom_path = pathlib.Path('pom.xml')
          pom = pom_path.read_text(encoding='utf-8')
          pom = re.sub(r'(<version>)([^<]+)(</version>)', rf'\g<1>{version}\g<3>', pom, count=1)
          pom = re.sub(r'(<artifactVersion>)([^<]+)(</artifactVersion>)', rf'\g<1>{version}\g<3>', pom, count=1)
          pom_path.write_text(pom, encoding='utf-8')

          readme_path = pathlib.Path('README.md')
          readme = readme_path.read_text(encoding='utf-8')
          readme = re.sub(r'(- API version: )([^\n]+)', rf'\g<1>{version}', readme, count=1)
          readme = re.sub(r'(<version>)([^<]+)(</version>)', rf'\g<1>{version}\g<3>', readme, count=1)
          readme = re.sub(r'(implementation "io\.github\.le-shi:java-gitea-api:)([^"]+)(")', rf'\g<1>{version}\g<3>', readme, count=1)
          readme = re.sub(r'(`target/java-gitea-api-)([^`]+)(\.jar`)', rf'\g<1>{version}\g<3>', readme, count=1)
          readme_path.write_text(readme, encoding='utf-8')
          PY

      - name: Verify synced version references
        run: |
          grep -q "<version>$VERSION</version>" pom.xml
          grep -q "<artifactVersion>$VERSION</artifactVersion>" pom.xml
          grep -q "<version>$VERSION</version>" README.md
          grep -q "implementation \"io.github.le-shi:java-gitea-api:$VERSION\"" README.md
          grep -q "target/java-gitea-api-$VERSION.jar" README.md

      - name: Clean previously generated artifacts
        run: |
          rm -f docs/*.md
          rm -f src/test/java/io/gitea/api/*Test.java
          rm -f src/main/java/io/gitea/api/*.java
          rm -f src/main/java/io/gitea/model/*.java

      - name: Regenerate repository and validate package
        run: mvn -B clean package

      - name: Verify built package version
        run: |
          test -f "target/java-gitea-api-$VERSION.jar"
          test -f "target/java-gitea-api-$VERSION-sources.jar"
          test -f "target/java-gitea-api-$VERSION-javadoc.jar"

      - name: Clean target directory after validation
        run: mvn -B clean

      - name: Commit regenerated sources
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add pom.xml README.md
            git add -A docs src
            git commit -m "chore: regenerate swagger artifacts for $VERSION"
            git push origin HEAD:${GITHUB_REF#refs/heads/}
          fi

      - name: Create tag if missing
        run: |
          git fetch --tags origin
          if git rev-parse "refs/tags/$VERSION" >/dev/null 2>&1; then
            echo "Tag $VERSION already exists locally"
          elif git ls-remote --exit-code --tags origin "refs/tags/$VERSION" >/dev/null 2>&1; then
            echo "Tag $VERSION already exists on origin"
            git fetch --tags origin
          else
            git tag "$VERSION" "$GITHUB_SHA"
            git push origin "refs/tags/$VERSION"
          fi

      - name: Verify tag points to current commit
        run: |
          git fetch --tags origin
          test "$(git rev-parse "refs/tags/$VERSION")" = "$GITHUB_SHA"

      - name: Create GitHub release if missing
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$VERSION" >/dev/null 2>&1; then
            echo "Release $VERSION already exists"
            exit 0
          fi
          gh release create "$VERSION" --verify-tag --title "$VERSION" --generate-notes

      - name: Dispatch release workflow
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh api \
            -X POST \
            "repos/$GH_REPO/actions/workflows/release.yml/dispatches" \
            -f ref="$VERSION"

          echo "Dispatched release workflow for tag $VERSION"
