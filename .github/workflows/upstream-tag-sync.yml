name: Discover Upstream Gitea Tags

on:
  workflow_dispatch:
    inputs:
      count:
        description: '本次最多处理多少个稳定 Tag'
        required: false
        default: '1'
  schedule:
    - cron: '17 */6 * * *'

permissions:
  actions: write
  contents: read

concurrency:
  group: upstream-tag-discovery
  cancel-in-progress: false

jobs:
  discover-upstream-tags:
    name: Find stable upstream tags and dispatch generators
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure current ref is master
        run: |
          case "$GITHUB_REF" in
            refs/heads/master) ;;
            *) echo "This workflow only supports master"; exit 1 ;;
          esac

      - name: Resolve processing count
        id: config
        run: |
          COUNT='${{ github.event.inputs.count }}'
          if [ -z "$COUNT" ]; then
            COUNT=1
          fi
          case "$COUNT" in
            ''|*[!0-9]*)
              echo "count must be a positive integer"
              exit 1
              ;;
          esac
          if [ "$COUNT" -lt 1 ]; then
            echo "count must be at least 1"
            exit 1
          fi
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Find candidate stable upstream tags
        id: candidates
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MIN_VERSION: 1.21.1
        run: |
          TAGS=$(git ls-remote --tags --refs https://github.com/go-gitea/gitea 'v1.*' \
            | awk '{print $2}' \
            | sed 's#refs/tags/##' \
            | grep -E '^v1\..*$' \
            | grep -Ev -- '-rc|-dev$' \
            | awk -v min_version="$MIN_VERSION" '
                function normalize(version,  parts, n, i, out) {
                  n = split(version, parts, ".")
                  out = ""
                  for (i = 1; i <= 3; i++) {
                    out = out sprintf("%09d", (i <= n ? parts[i] + 0 : 0))
                  }
                  return out
                }
                {
                  version = substr($0, 2)
                  if (normalize(version) >= normalize(min_version)) {
                    print
                  }
                }
              ' \
            | sort -V -r)

          if [ -z "$TAGS" ]; then
            echo "No stable upstream tag matched the filter"
            exit 1
          fi

          mkdir -p .github/tmp
          : > .github/tmp/selected-tags.txt
          while IFS= read -r TAG; do
            [ -z "$TAG" ] && continue
            VERSION=${TAG#v}
            if git ls-remote --exit-code --heads origin "release/$VERSION" >/dev/null 2>&1; then
              continue
            fi
            printf '%s\n' "$TAG" >> .github/tmp/selected-tags.txt
            if [ "$(wc -l < .github/tmp/selected-tags.txt)" -ge "${{ steps.config.outputs.count }}" ]; then
              break
            fi
          done <<EOF
          $TAGS
          EOF

          if [ ! -s .github/tmp/selected-tags.txt ]; then
            echo "No new release branches need to be created"
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "found=true" >> "$GITHUB_OUTPUT"
          echo "Selected tags:"
          cat .github/tmp/selected-tags.txt

      - name: Dispatch release branch generator
        if: steps.candidates.outputs.found == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          while IFS= read -r TAG; do
            [ -z "$TAG" ] && continue
            echo "Dispatch generator for $TAG"
            gh api \
              -X POST \
              "repos/$GH_REPO/actions/workflows/upstream-release-branch.yml/dispatches" \
              -f ref='master' \
              -f inputs[tag]="$TAG"
          done < .github/tmp/selected-tags.txt

          rm -rf .github/tmp

          echo "Dispatched all selected tags"

      - name: Clean temporary files after failure
        if: failure()
        run: rm -rf .github/tmp

      - name: Report no-op run
        if: steps.candidates.outputs.found == 'false'
        run: |
          rm -rf .github/tmp
          echo "No new stable upstream tags require release branch creation"
